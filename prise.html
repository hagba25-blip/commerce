<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayPay Shop</title>
  <!-- Polices modernes -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div style="display:flex; align-items:center;">
    <h1>PayPay</h1>
    <img src="images/logo_vente.png" alt="Logo">
  </div>
  <div style="display:flex; align-items:center; gap:20px;"> 
    <div class="search-toggle" onclick="toggleSearch()"><i class="fas fa-search"></i></div>
    <!-- Sélecteur de langue --> 
    <select onchange="setLanguage(this.value)"> 
      <option value="fr">Français</option> 
      <option value="en">English</option> 
      <option value="ew">Eʋegbe</option> 
    </select>

    <!-- Icône panier qui redirige vers cart.html -->
    <div class="cart-icon" onclick="window.location.href='cart.html'">
      <i class="fas fa-shopping-cart"></i>
      <span id="cartCount">0</span>
    </div>
  </div>
</header>

<div class="search-bar" id="searchBar" style="display:none;">
  <input type="text" id="searchInput" placeholder="Chercher un produit..." onkeyup="searchProduct()">
</div>

<div class="products" id="productList"></div>

<footer>
  <a href="https://wa.me/22891962246" target="_blank"><i class="fab fa-whatsapp"></i></a>
  <a href="mailto:sol.infotech10@gmail.com"><i class="fas fa-envelope"></i></a>
  <a href="https://www.facebook.com/marketplace/item/791895487276760/" target="_blank"><i class="fab fa-facebook"></i></a>
  <a href="https://tiktok.com/@freenet.technolog" target="_blank"><i class="fab fa-tiktok"></i></a>
  <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
</footer>

<script src="i18n.js"></script>
<script src="main.js"></script>

</body>
</html>
